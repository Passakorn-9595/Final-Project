name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 12 hours to prevent Streamlit from putting the app to sleep
    - cron: '0 */12 * * *'
  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App to keep it active
        run: |
          curl -sS https://final-project-2vl3fcyz5qpc5mbhpfy26a.streamlit.app > /dev/null
          echo "Successfully pinged the app to keep it awake!"
